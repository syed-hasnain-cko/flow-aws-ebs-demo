


<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Payment Failed</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header style="background: linear-gradient(135deg, #FF4D4D 0%, #B91C1C 100%);">
        <h1>Payment Failed</h1>
    </header>

    <main class="wrapper">
        <div class="status-container failure">
            <div id="toast-container" class="toast-container"></div>
            
            <img src="https://cdn-icons-png.flaticon.com/512/1828/1828843.png" alt="Failure" class="status-image">
            <h2>Payment Declined</h2>
            <p>We couldn't process your transaction. Please check your details and try again.</p>
            <p id="error-details" style="color: #64748B; font-size: 14px;">
                Reference: <span id="error-message" style="font-family: monospace; font-weight: 600;"></span>
            </p>
            <p id="webhook-status" style="font-size:13px; color:#6366f1; margin-top:4px;">⏳ Listening for webhook updates...</p>

            <div class="button-group">
                <a href="index.html" class="main-button" style="background-color: #64748B;">Return to Home</a>
                <button id="fetch-details-button" class="main-button">Debug Payment Details</button>
            </div>

            <div id="details-container" class="details-container" style="display: none; margin-top: 30px;">
                <div id="payment-details-container" class="detail-box full-width">
                    <div class="detail-header">
                        <h3>Declined Payment Data</h3>
                        <button class="copy-btn" onclick="copyToClipboard('payment-details-response')">
                            Copy JSON
                        </button>
                    </div>
                    <div id="payment-details-response"></div>
                </div>
            </div>
        </div>
    </main>

    <div id="modal" class="modal" style="display: none;">
        <div class="modal-content">
            <span class="close-button">&times;</span>
            <h2>Webhook Event</h2>
            <pre id="status-message"></pre>
        </div>
    </div>

    <script src="frontend-config.js"></script>
    <script src="utils.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const urlParams = new URLSearchParams(window.location.search);
            // Support multiple possible ID params
            let paymentId = urlParams.get('cko-payment-id') || urlParams.get('paymentId');

            if (paymentId) {
                document.getElementById('error-message').innerText = paymentId;
            }

            document.getElementById('fetch-details-button').addEventListener('click', async () => {
                if (paymentId) {
                    try {
                        const queryParams = new URLSearchParams({ paymentId: paymentId });
                        const paymentData = await fetchPaymentDetails(paymentId);

                        // Use the pretty print function from utils.js
                        if (typeof formatJSON === 'function') {
                            document.getElementById('payment-details-response').innerHTML = formatJSON(paymentData);
                        } else {
                            // Fallback if utils isn't loaded
                            document.getElementById('payment-details-response').innerText = JSON.stringify(paymentData, null, 2);
                        }

                        document.getElementById('details-container').style.display = 'flex';
                    } catch (error) {
                        console.error("Error fetching declined details:", error);
                    }
                }
            });

            // Start webhook polling if we have a paymentId
            if (paymentId) startWebhookPolling(paymentId);
        });

        let webhookPoller = null;

        function startWebhookPolling(paymentId) {
            const POLL_INTERVAL_MS = 2000;
            const POLL_TIMEOUT_MS = 120000; // 2 minutes
            const statusEl = document.getElementById('webhook-status');
            const startTime = Date.now();

            const TERMINAL_EVENTS = new Set([
                'payment_captured', 'payment_declined', 'payment_expired',
                'payment_canceled', 'payment_refunded', 'payment_voided'
            ]);

            webhookPoller = setInterval(async () => {
                if (Date.now() - startTime > POLL_TIMEOUT_MS) {
                    stopWebhookPolling();
                    if (statusEl) statusEl.style.display = 'none';
                    return;
                }

                try {
                    const res = await fetch(`${window.APP_CONFIG.apiBaseUrl}/webhook-event?paymentId=${paymentId}`);
                    if (res.status === 404) return; // no event yet, keep polling

                    const event = await res.json();
                    if (!event.found) return;

                    const label = event.type.replace(/_/g, ' ');
                    console.log('Webhook received on failure page:', event.type, event.data);
                    if (statusEl) statusEl.textContent = `Webhook: ${label}`;

                    // All events: refresh details panel and show a toast
                    // Redirects are handled by the gateway (3DS) or synchronously — webhooks only update the UI
                    if (event.type === 'card_verified') {
                        showToast('Card verified');
                    } else {
                        const isError = ['payment_declined', 'payment_expired', 'payment_canceled'].includes(event.type);
                        const reason = isError
                            ? (event.data?.response_summary || event.data?.response_code || label)
                            : label;
                        showToast(isError ? `${label}: ${reason}` : label, isError ? 'error' : 'success');
                        try {
                            const paymentData = await fetchPaymentDetails(paymentId);
                            if (typeof formatJSON === 'function') {
                                document.getElementById('payment-details-response').innerHTML = formatJSON(paymentData);
                            } else {
                                document.getElementById('payment-details-response').innerText = JSON.stringify(paymentData, null, 2);
                            }
                            document.getElementById('details-container').style.display = 'flex';
                        } catch (e) { console.error(e); }
                    }

                    if (TERMINAL_EVENTS.has(event.type)) {
                        stopWebhookPolling();
                        if (statusEl) statusEl.style.display = 'none';
                    }
                } catch (e) {
                    console.error('Webhook poll error:', e);
                }
            }, POLL_INTERVAL_MS);
        }

        function stopWebhookPolling() {
            if (webhookPoller) {
                clearInterval(webhookPoller);
                webhookPoller = null;
            }
        }
    </script>
    <script src="./websocket.js"></script>
</body>
</html>
