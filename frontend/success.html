<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Payment Success</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Payment Success</h1>
    </header>
    
    <main class="wrapper">
        <div class="status-container success">
            <div id="toast-container" class="toast-container"></div>
            <img src="https://cdn.dribbble.com/userupload/13699651/file/original-94a7295388c54008d79a9bee8ca5c0d4.png" alt="Success" class="status-image">
            <h2>Thank you for your payment!</h2>
            <p>Your payment was successful.</p>
            <p id="payment-details">Order ID: <span id="payment-id"></span></p>
            
            <div class="button-group">
                <a href="index.html" class="main-button">Return to Home</a>
                <button id="fetch-details-button" class="main-button">Fetch Payment Details</button>
                <button id="further-actions-button" class="main-button">Further Actions</button>
            </div>

            <div id="wallet-debug-container" class="detail-box" style="display: none; margin-top: 30px; width: 100%; border-top: 2px solid #e2e8f0; padding-top: 20px;">
                <div class="detail-header">
                    <h3 id="wallet-log-title" style="color: var(--primary);">Wallet SDK Trace</h3>
                    <button class="copy-btn" onclick="copyToClipboard('wallet-sdk-response')">Copy Trace</button>
                </div>
                <div id="wallet-sdk-response" style="text-align: left;"></div>
            </div>

            <div id="action-buttons" class="button-group" style="display: none; margin-top: 20px;"></div>

            <div id="details-container" class="details-container" style="display: none;">
                <div id="payment-details-container" class="detail-box">
                    <div class="detail-header">
                        <h3>Payment Details</h3>
                        <button class="copy-btn" onclick="copyToClipboard('payment-details-response')">Copy JSON</button>
                    </div>
                    <div id="payment-details-response"></div>
                </div>

                <div id="payment-actions-container" class="detail-box">
                    <div class="detail-header">
                        <h3>Available Actions</h3>
                        <button class="copy-btn" onclick="copyToClipboard('payment-actions-response')">Copy JSON</button>
                    </div>
                    <div id="payment-actions-response"></div>
                </div>
            </div>
        </div>
        <div id="api-sidebar" class="api-log-sidebar">
    <div class="sidebar-header">
        <span class="header-label">API ACTIVITY LOG</span>
        <button onclick="clearApiLogs()" class="clear-logs-btn" title="Clear All Logs">
            <span class="icon">×</span> CLEAR
        </button>
    </div>
    <div id="log-entries" class="log-entries-container">
        </div>
</div>

<div id="log-modal" class="modal-overlay" style="display:none;">
    <div class="modal-content">
        <div class="modal-header">
            <h3>Request & Response Details</h3>
            <button onclick="closeLogModal()" class="close-modal">&times;</button>
        </div>
        <div class="modal-body">
            <div class="json-section">
                <label>Request Body</label>
                <pre id="modal-req-body" class="json-code-block"></pre>
            </div>
            <div class="json-section">
                <label>Response Body</label>
                <pre id="modal-res-body" class="json-code-block"></pre>
            </div>
        </div>
    </div>
</div>
    </main>

    <script src="utils.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", async () => {
            // Handle Wallet Logs
            const storedLog = sessionStorage.getItem('wallet_debug_log');
            if (storedLog) {
                try {
                    const logData = JSON.parse(storedLog);
                    const container = document.getElementById('wallet-debug-container');
                    const responseElement = document.getElementById('wallet-sdk-response');
                    const titleElement = document.getElementById('wallet-log-title');

                    if (container && responseElement) {
                        titleElement.innerText = `${logData.source} SDK Trace`;
                        if (typeof formatJSON === 'function') {
                            responseElement.innerHTML = formatJSON(logData);
                        } else {
                            responseElement.innerHTML = `<pre>${JSON.stringify(logData, null, 2)}</pre>`;
                        }
                        container.style.display = 'block';
                    }
                    sessionStorage.removeItem('wallet_debug_log');
                } catch (e) { console.error("Log error:", e); }
            }

            // Handle API Data
            const urlParams = new URLSearchParams(window.location.search);
            let paymentId = urlParams.get('paymentId') || urlParams.get('cko-payment-id');

            if (paymentId) {
                try {
                    const paymentData = await fetchPaymentDetails(paymentId);
                    document.getElementById('payment-id').innerText = paymentData.reference || paymentId;
                } catch (e) { console.error(e); }
            }
        
            document.getElementById('fetch-details-button').addEventListener('click', () => updatePaymentDetailsData(paymentId));
            document.getElementById('further-actions-button').addEventListener('click', () => updatePaymentDetailsData(paymentId));
        });
    </script>
</body>
</html>
