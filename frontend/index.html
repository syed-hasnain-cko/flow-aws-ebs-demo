<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Flow Demo</title>
    <link href="https://fonts.googleapis.com/css?family=Roboto:400,700" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- App shell: filled synchronously by tabs/loader.js -->
    <div id="app"></div>

    <!-- 1. Inject all tab HTML before any module script runs -->
    <script src="tabs/loader.js"></script>

    <!-- 2. App config: sets window.APP_CONFIG with env-specific values -->
    <script src="frontend-config.js"></script>

    <!-- 4. Checkout.com Web Components SDK -->
    <!-- <script src="https://checkout-web-components.cko-qa.ckotech.co/index.js"></script> -->
    <script src="https://checkout-web-components.checkout.com/index.js"></script>

    <!-- 5. Shared utilities and data (must load before feature modules) -->
    <script src="utils.js"></script>
    <script src="modules/data.js"></script>

    <!-- 6. Feature modules -->
    <script src="modules/wallets.js"></script>
    <script src="modules/flow.js"></script>
    <script src="modules/payment-setup.js"></script>

    <!-- 7. Main entry: dropdown population + tab switching -->
    <script src="script.js"></script>

    <!-- 8. Wallet implementations -->
    <script src="google-pay.js"></script>
    <script src="apple-pay.js"></script>

</body>
</html>
