<div class="context-area">
    <h2 class="section-header">1. Create Payment Setup</h2>
    <div class="inline-form">
        <div class="form-group">
            <label class="text-label">Processing Channel ID</label>
            <input type="text" id="setup-pc-id" class="text-input" value="">
        </div>
        <div class="form-group">
            <label class="text-label">Amount</label>
            <input type="number" id="setup-amount" class="text-input" value="100">
        </div>
    </div>
    <div class="inline-form">
        <div class="form-group">
            <label class="select-label">Currency</label>
            <select id="setup-currency" class="select-input"></select>
        </div>
        <div class="form-group">
            <label for="setup-payment-type" class="select-label">Payment Type</label>
            <select id="setup-payment-type" class="select-input">
                <option value="Regular" selected>Regular</option>
                <option value="Recurring">Recurring</option>
                <option value="Unscheduled">Unscheduled</option>
                <option value="Installment">Installment</option>
            </select>
        </div>
        <div class="form-group" style="justify-content: flex-end; padding-bottom: 2px;">
            <label class="toggle-label">Capture</label>
            <label class="switch" style="margin-top: 8px;">
                <input type="checkbox" id="setup-capture-toggle">
                <span class="slider round"></span>
            </label>
        </div>
    </div>
    <div class="button-group">
        <button id="create-setup-btn" class="main-button">Initialize Setup</button>
    </div>

    <hr style="margin: 30px 0; border: 0; border-top: 1px solid var(--border);">

    <div id="setup-methods-container" style="display:none;">
        <h2 class="section-header">2. Available Methods</h2>
        <div id="methods-grid" style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px;"></div>

        <div id="dynamic-inputs-area"></div>

        <template id="order-items-template">
            <div class="context-area" style="background:var(--bg-subtle); margin-top:15px; border: 1px solid var(--border);">
                <h4 style="margin:0 0 10px 0; font-size:12px; color:var(--text-secondary); letter-spacing:1px;" class="order-items-title">ORDER ITEMS</h4>
                <div class="order-items-list"></div>
                <button class="add-order-item main-button" style="background:var(--border-strong); font-size:12px; padding:5px 10px; margin-top:10px;">+ Add Item</button>
            </div>
        </template>

        <div class="button-group" style="margin-top: 20px;">
            <button id="patch-setup-btn" class="main-button" style="background: var(--success); display: none;">
                Update Payment Setup
            </button>
        </div>
    </div>

    <div id="toast-container-klarna" class="toast-container-klarna"></div>

    <div id="sdk-widget-container" class="sdk-widget-box" style="display:none;">
        <h3 class="section-header" id="widget-title">Payment Method Provider</h3>
        <div id="klarna_container"></div>
    </div>

    <div id="final-status-area" class="final-status-area" style="display:none;"></div>

    <div id="setup-response-container" style="display:none; margin-top:20px;">
        <pre id="setup-json-output" class="json-code-block"></pre>
    </div>
</div>
